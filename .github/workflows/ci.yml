# ============================================================================
# ci.yml - Continuous Integration Workflow
# ============================================================================
# This workflow runs on every pull request to ensure code quality.
# Uses Workload Identity Federation for secure authentication.
# ============================================================================

name: CI

# ============================================================================
# TRIGGERS
# ============================================================================
on:
  pull_request:
    branches:
      - main
      - dev
      - stage
      - 'release/**'
  push:
    branches:
      - main
      - dev

# ============================================================================
# CONCURRENCY
# ============================================================================
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
# JOBS
# ============================================================================
jobs:
  ci:
    name: Lint, Type Check, Build, Test
    runs-on: ubuntu-latest

    steps:
      # ======================================================================
      # STEP 1: Checkout Code
      # ======================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ======================================================================
      # STEP 2: Setup pnpm
      # ======================================================================
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # ======================================================================
      # STEP 3: Setup Node.js
      # ======================================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # ======================================================================
      # STEP 4: Install Dependencies
      # ======================================================================
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ======================================================================
      # STEP 4.1: Security Audit
      # ======================================================================
      - name: Dependency audit
        run: pnpm audit --audit-level=critical

      # ======================================================================
      # STEP 5: Turborepo Cache
      # ======================================================================
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # ======================================================================
      # STEP 6: Lint
      # ======================================================================
      - name: Lint
        run: pnpm lint

      # ======================================================================
      # STEP 7: Format Check
      # ======================================================================
      - name: Check formatting
        run: pnpm format:check

      # ======================================================================
      # STEP 8: Type Check
      # ======================================================================
      - name: Type check
        run: pnpm typecheck

      # ======================================================================
      # STEP 9: Build
      # ======================================================================
      - name: Build
        run: pnpm build

      # ======================================================================
      # STEP 10: Test
      # ======================================================================
      - name: Test
        run: pnpm test

      # ======================================================================
      # STEP 11: Dependency Consistency Check
      # ======================================================================
      - name: Check dependency consistency
        run: pnpm sync:lint

  # ========================================================================
  # E2E Tests (Playwright + Firebase Emulators)
  # ========================================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build frontend for emulator mode
        run: pnpm turbo build --filter=web
        env:
          VITE_USE_EMULATOR: 'true'
          VITE_FIREBASE_API_KEY: 'fake-api-key'
          VITE_FIREBASE_AUTH_DOMAIN: 'localhost'
          VITE_FIREBASE_PROJECT_ID: 'orion-ai-2790b'

      - name: Run E2E tests
        run: |
          firebase emulators:exec --only auth,firestore \
            "pnpm test:e2e" \
            --project orion-ai-2790b
        env:
          VITE_USE_EMULATOR: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7
